const doorPositions = {
  "developer": { x: -20, z: 10 }, "project_manager": { x: -5, z: 10 }, "tester": { x: 10, z: 10 }, "designer": { x: 25, z: 10 },
  "sales_rep": { x: -20, z: 0 }, "hr_manager": { x: -5, z: 0 }, "intern": { x: 10, z: 0 }, "janitor": { x: 25, z: 0 },
};
const walkState = new Map(); // id -> { path: [{x,z}], pathIdx, isWalking }
                                                                                                                                                                                                                                                                                                                                                                    // ---- Fetch + render ----
                                                                                                                                                                                                                                                                                                                                                                        // Default: use the page's own origin (works when served from simulation_server.py on :8080).
                                                                                                                                                                                                                                                                                                                                                                            // Override with ?server=http://host:port if needed (e.g., page on :8000, API on :8080).
                                                                                                                                                                                                                                                                                                                                                                                const params = new URLSearchParams(window.location.search);
                                                                                                                                                                                                                                                                                                                                                                                    const serverBase = params.get("server") || (window.location.origin || "http://localhost:8080");
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                        async function loadState() {
                                                                                                                                                                                                                                                                                                                                                                                              console.log("[viewer] loadState() start, serverBase=", serverBase);
                                                                                                                                                                                                                                                                                                                                                                                                    let res;
                                                                                                                                                                                                                                                                                                                                                                                                          try {
                                                                                                                                                                                                                                                                                                                                                                                                                  res = await fetch(serverBase + "/state");
                                                                                                                                                                                                                                                                                                                                                                                                                          console.log("[viewer] fetch responded, status=", res.status);
                                                                                                                                                                                                                                                                                                                                                                                                                                } catch (fetchErr) {
                                                                                                                                                                                                                                                                                                                                                                                                                                        console.error("[viewer] fetch threw:", fetchErr);
                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("info").textContent = "FETCH ERROR: " + (fetchErr.message || fetchErr);
                                                                                                                                                                                                                                                                                                                                                                                                                                                        throw fetchErr;
                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!res.ok) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const txt = await res.text().catch(() => "(no body)");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    console.error("[viewer] non-OK response:", res.status, txt);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("info").textContent = "HTTP " + res.status + ": " + txt;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    throw new Error("HTTP " + res.status);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const data = await res.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      console.log("[viewer] got data: tick=", data.tick, "agents=", data.agents?.length, "events=", data.events?.length);

                                                      // ---- Behavior lookup from events ----
                                                      const behaviorColors = {
                                                          "share_immediately": 0x44cc44,
                                                          "verify_then_share": 0x44cc44,
                                                          "verify_then_ignore": 0xcccc44,
                                                          "ignore": 0x888888,
                                                          "flag_as_suspicious": 0xcc4444,
                                                      };
                                                      const agentLastBehavior = {};
                                                      if (data.events && Array.isArray(data.events)) {
                                                          for (const ev of data.events) {
                                                              if (ev.agent_id && ev.behavior) agentLastBehavior[ev.agent_id] = ev.behavior;
                                                          }
                                                      }

                                                      // ---- Detect new events ----
                                                      const prevKey = "_prevEvents";
                                                      const prevEvents = window[prevKey] || [];
                                                      const newEvents = [];
                                                      if (data.events && Array.isArray(data.events)) {
                                                          const prevSet = new Set(prevEvents.map(e => e.timestamp + e.agent_id + e.behavior));
                                                          for (const ev of data.events) {
                                                              const key = ev.timestamp + ev.agent_id + ev.behavior;
                                                              if (!prevSet.has(key)) newEvents.push(ev);
                                                          }
                                                          window[prevKey] = data.events.slice();
                                                      }

                                                      // ---- Helper: floating label ----
                                                      function showFloatingLabel(mesh, text) {
                                                          // Simple HTML label overlay
                                                          const label = document.createElement("div");
                                                          label.textContent = text;
                                                          label.style.cssText = "position:fixed; background:rgba(0,0,0,0.6); color:#fff; padding:2px 6px; border-radius:4px; font-size:11px; pointer-events:none; z-index:100;";
                                                          document.body.appendChild(label);
                                                          // Project mesh position to screen
                                                          const v = mesh.position.clone().project(camera);
                                                          const x = (v.x * 0.5 + 0.5) * window.innerWidth;
                                                          const y = (-v.y * 0.5 + 0.5) * window.innerHeight;
                                                          label.style.left = (x + 10) + "px";
                                                          label.style.top = (y - 10) + "px";
                                                          // Fade out and remove
                                                          setTimeout(() => {
                                                              label.style.transition = "opacity 1s";
                                                              label.style.opacity = "0";
                                                              setTimeout(() => label.remove(), 1000);
                                                          }, 500);
                                                      }

                                                      // ---- Update or create meshes for each agent ----
                                                      for (const a of data.agents) {
                                                          let mesh = agentMeshes.get(a.id);
                                                          // Determine color from behavior, fallback to type
                                                          const beh = agentLastBehavior[a.id];
                                                          let color = behaviorColors[beh];
                                                          if (color === undefined) {
                                                              const typeColors = {
                                                                  "immediate_sharer": 0xff6666,
                                                                  "cautious_sharer": 0x66aaff,
                                                                  "skeptic": 0xffcc66,
                                                                  "influencer": 0x66ff99,
                                                                  "lurker": 0xcccccc,
                                                              };
                                                              color = typeColors[a.type] || 0x9999ff;
                                                          }
                                                          if (!mesh) {
                                                              mesh = makeAgentMesh(color, a);
                                                              mesh.userData.agentId = a.id;
                                                              mesh.userData.agentName = a.name;
                                                              mesh.userData.behaviorColor = color;
                                                              scene.add(mesh);
                                                              agentMeshes.set(a.id, mesh);
                                                              // Initial position only (once, when created)
                                                              const rc = roomCenters[a.job_role] || { x: a.x ?? 0, z: a.z ?? 0 };
                                                              mesh.position.set(rc.x, a.y ?? 0, rc.z);
                                                              mesh.userData.homeRoom = rc;
                                                          } else if (mesh.userData.behaviorColor !== color) {
                                                              mesh.userData.behaviorColor = color;
                                                              mesh.traverse(child => { if (child.material) child.material.color.setHex(color); });
                                                          }
// DO NOT reset position here - walking animation controls position
                                                          mesh.userData.lastBehavior = beh || null;
                                                      }

                                                      // ---- Persistent labels (always visible per agent) ----
                                                      if (!window.persistentLabels) window.persistentLabels = new Map();
                                                      for (const a of data.agents) {
                                                          const mesh = agentMeshes.get(a.id);
                                                          if (!mesh) continue;
                                                          const beh = agentLastBehavior[a.id] || "(idle)";
                                                          let label = window.persistentLabels.get(a.id);
                                                          if (!label) {
                                                              label = document.createElement("div");
                                                              label.style.cssText = "position:fixed; background:rgba(0,0,0,0.5); color:#ddd; padding:1px 4px; border-radius:3px; font-size:10px; pointer-events:none; z-index:50; white-space:nowrap;";
                                                              document.body.appendChild(label);
                                                              window.persistentLabels.set(a.id, label);
                                                          }
                                                          const shortBeh = beh.replace(/_/g, " ");
                                                          const name = a.name || a.id;
                                                          label.textContent = name + ": " + shortBeh;
                                                          label.style.display = "block";

                                                      // Remove labels for agents that no longer exist

                                                          if (!data.agents.find(a => a.id === id)) {

                                                      // ---- Remove meshes for agents that no longer exist ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        for (const [id, mesh] of agentMeshes) {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          scene.remove(mesh);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    agentMeshes.delete(id);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // ---- Draw network edges ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (!window.edgeLines) window.edgeLines = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for (const line of window.edgeLines) scene.remove(line);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          window.edgeLines.length = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (data.edges && Array.isArray(data.edges)) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        for (const e of data.edges) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const fromMesh = agentMeshes.get(e.from);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const toMesh = agentMeshes.get(e.to);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (fromMesh && toMesh) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const pts = [fromMesh.position.clone(), toMesh.position.clone()];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const mat = new THREE.LineBasicMaterial({ color: 0x444466, transparent: true, opacity: 0.3 });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const line = new THREE.Line(geo, mat);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        scene.add(line);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                window.edgeLines.push(line);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // ---- Floating labels for new events ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  for (const ev of newEvents) {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (mesh) showFloatingLabel(mesh, ev.behavior);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("info").textContent =
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        `Server: ${serverBase} | Tick: ${data.tick} | State: ${data.state} | Agents: ${data.agents.length}`;
                                                                                                window.lastData = data; // cache for click-to-select agent detail

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // ---- Update left panel: Task Board (products + team activity) ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function updateTaskBoard(data) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const el = document.getElementById("task-board");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (!data.office) { el.innerHTML = "<em>No office data</em>"; return; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  let html = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // Active Products
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  html += '<div style="color:#4f4;font-weight:bold;margin-bottom:4px;">📦 Active Products</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const products = data.office.active_products || data.office.products || [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (products.length === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      html += '<div style="color:#888;">(No active products)</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      for (const p of products) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const prog = p.progress || 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const st = p.status || "unknown";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          html += `<div class="prod-item"><b>${p.name}</b><br/><span class="status-${st}">${st}</span> ${prog}%`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          html += `<div class="progress-bar"><div style="width:${prog}%"></div></div></div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // In-progress tasks / Team activity
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  html += '<div style="color:#4af;font-weight:bold;margin:8px 0 4px;">👥 Team Activity</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const tasks = data.office.in_progress_tasks || [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (tasks.length === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      html += '<div style="color:#888;">(No tasks in progress)</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      for (const t of tasks) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const who = t.assigned_to ? (data.agents.find(a=>a.id===t.assigned_to)?.name || t.assigned_to) : "unassigned";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          html += `<div class="task-item"><b>${t.title}</b><br/>${who} · ${t.progress}%</div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // Stats
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const s = data.office.stats || {};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  html += `<div style="margin-top:8px;color:#aaa;font-size:10px;">Tasks: ${s.completed||0} done · ${s.in_progress||0} in prog · ${s.pending||0} pending<br/>Products: ${s.shipped_products||0} shipped · ${s.active_products||0} active</div>`;
