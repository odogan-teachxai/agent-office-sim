                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // ---- Update right panel: Recent Events ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function updateRecentEvents(data) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const el = document.getElementById("recent-events");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const events = data.events || [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (events.length === 0) { el.innerHTML = "<em>No events yet</em>"; return; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // Show last 12 events, newest first
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const recent = events.slice(-12).reverse();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  let html = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  for (const ev of recent) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const tick = ev.tick ?? "?";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const name = ev.agent_name || ev.agent_id || "agent";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const beh = ev.behavior || ev.event_type || "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const post = ev.post_subject ? ` · ${ev.post_subject.slice(0,40)}` : "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      html += `<div class="event-item"><b>#${tick}</b> ${name} → <span style="color:#4f4">${beh.replace(/_/g," ")}</span>${post}</div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  el.innerHTML = html;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              updateRecentEvents(data);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              console.log("[viewer] loadState() OK");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Initial load
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log("[viewer] Initial load, serverBase=", serverBase);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("info").textContent = `Connecting to ${serverBase} ...`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadState().catch(err => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          console.error("[viewer] loadState failed:", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("info").textContent = `Failed to load from ${serverBase}: ${err}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                        // ---- Auto-tick: drive simulation continuously (with pause) ----
                                                            (function startAutoTick() {
                                                                  const TICK_MS = 2200;
                                                                  let paused = false;
                                                                  let intervalId = null;
                                                                  async function doTick() {
                                                                          if (paused) return;
                                                                          try {
                                                                                  await fetch(serverBase + "/tick", { method: "POST" });
                                                                                  await loadState();
                                                                                  } catch (e) { console.error("[viewer] auto-tick:", e); }
                                                                              }
                                                                  function start() { if (!intervalId) { intervalId = setInterval(doTick, TICK_MS); console.log("[viewer] Auto-tick started"); } }
                                                                  function stop() { if (intervalId) { clearInterval(intervalId); intervalId = null; console.log("[viewer] Auto-tick paused"); } }
                                                                  const btn = document.getElementById("pause-btn");
                                                                  btn.onclick = () => { paused = !paused; if (paused) { stop(); btn.textContent = "▶ Resume"; } else { start(); btn.textContent = "⏸ Pause"; } };
                                                                  start();
                                                                  })();
// ---- Render loop ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (renderer && controls && camera && scene) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function animate() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          requestAnimationFrame(animate);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  controls.update();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          renderer.render(scene, camera);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          // Update persistent label positions
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (window.persistentLabels) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  for (const [id, label] of window.persistentLabels) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const mesh = agentMeshes.get(id);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (!mesh) continue;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const v = mesh.position.clone().project(camera);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const x = (v.x * 0.5 + 0.5) * window.innerWidth;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const y = (-v.y * 0.5 + 0.5) * window.innerHeight;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          label.style.left = (x + 12) + "px";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          label.style.top = (y - 8) + "px";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
// Walking animation with simple pathing (door -> corridor -> door)
for (const [id, m] of agentMeshes) {
  let ws = walkState.get(id);
  if (!ws) { ws = { path: [], pathIdx: 0, isWalking: false }; walkState.set(id, ws); }
  // Start a new walk occasionally
  if (!ws.isWalking && Math.random() < 0.0015) {
    const targetJob = Object.keys(roomCenters)[Math.floor(Math.random() * Object.keys(roomCenters).length)];
    const targetDoor = doorPositions[targetJob] || roomCenters[targetJob];
    const targetCenter = roomCenters[targetJob];
    // Simple path: currentPos -> corridorMid -> targetDoor -> targetCenter
    const currentPos = { x: m.position.x, z: m.position.z };
    const corridorMid = { x: (currentPos.x + targetDoor.x) / 2, z: (currentPos.z + targetDoor.z) / 2 };
    ws.path = [currentPos, corridorMid, targetDoor, targetCenter];
    ws.pathIdx = 1; // start heading to corridorMid
    ws.isWalking = true;
  }
  if (ws.isWalking && ws.path.length > 0) {
    const wp = ws.path[ws.pathIdx];
    const dx = wp.x - m.position.x, dz = wp.z - m.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const speed = 0.005; // slow but visible walking
    if (dist < 0.3) {
      ws.pathIdx++;
      if (ws.pathIdx >= ws.path.length) { ws.isWalking = false; ws.path = []; }
    } else {
      m.position.x += (dx / dist) * speed;
      m.position.z += (dz / dist) * speed;
      const t = performance.now() / 1000;
      m.position.y = Math.abs(Math.sin(t * 4)) * 0.10; // gentle bobbing
      m.children.forEach((c, i) => {
        if (i === 8 || i === 9) c.rotation.z = (i === 8 ? 1 : -1) * (0.10 + Math.sin(t * 4) * 0.35);
      });
    }
  }
}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      animate();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Handle resize
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  window.addEventListener("resize", () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          camera.aspect = window.innerWidth / window.innerHeight;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  camera.updateProjectionMatrix();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          renderer.setSize(window.innerWidth, window.innerHeight);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      console.log("[viewer] Render loop started");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                console.warn("[viewer] Skipping render loop (scene setup failed)");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </body>
